kind = "web"
previewPath = "/"
title = "노들섬 홍보 통합 시스템"
version = "1.0.0"
id = "artifacts/nodeul-pr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19937

[services.development]
run = "pnpm --filter @workspace/nodeul-pr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nodeul-pr", "run", "build" ]
publicDir = "artifacts/nodeul-pr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19937"
BASE_PATH = "/"
