openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 노들섬 홍보 통합 시스템 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: organizations
    description: Organization (대관사) management
  - name: events
    description: Event (행사) management
  - name: promotionZones
    description: Promotion zone management
  - name: promotionRequests
    description: Promotion request management
  - name: assets
    description: Asset upload and version management
  - name: schedules
    description: Content scheduling management
  - name: comments
    description: Comments and communication log
  - name: emailLogs
    description: Email send history
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: admin
    description: Admin-only endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # === USERS ===
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # === ORGANIZATIONS ===
  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List organizations (admin sees all, user sees own)
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationInput"
      responses:
        "201":
          description: Created organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{id}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    patch:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationUpdate"
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  # === EVENTS ===
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: organizationId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventList"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event detail with full workflow data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /events/{id}/timeline:
    get:
      operationId: getEventTimeline
      tags: [events]
      summary: Get full event timeline (all activity log)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event timeline entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEntry"

  # === PROMOTION ZONES ===
  /promotion-zones:
    get:
      operationId: listPromotionZones
      tags: [promotionZones]
      summary: List all promotion zones
      responses:
        "200":
          description: List of promotion zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PromotionZone"
    post:
      operationId: createPromotionZone
      tags: [promotionZones]
      summary: Create promotion zone (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionZoneInput"
      responses:
        "201":
          description: Created zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionZone"

  /promotion-zones/availability:
    get:
      operationId: checkZoneAvailability
      tags: [promotionZones]
      summary: Check zone availability for date range
      parameters:
        - name: zoneId
          in: query
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          required: true
          schema:
            type: string
        - name: endDate
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability result with conflict info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoneAvailability"

  # === PROMOTION REQUESTS ===
  /promotion-requests:
    get:
      operationId: listPromotionRequests
      tags: [promotionRequests]
      summary: List promotion requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: eventId
          in: query
          schema:
            type: integer
        - name: zoneId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of promotion requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PromotionRequest"
    post:
      operationId: createPromotionRequest
      tags: [promotionRequests]
      summary: Create promotion request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionRequestInput"
      responses:
        "201":
          description: Created promotion request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionRequest"

  /promotion-requests/{id}:
    get:
      operationId: getPromotionRequest
      tags: [promotionRequests]
      summary: Get promotion request detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Promotion request detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionRequest"
    patch:
      operationId: updatePromotionRequest
      tags: [promotionRequests]
      summary: Update promotion request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionRequestUpdate"
      responses:
        "200":
          description: Updated promotion request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionRequest"

  /promotion-requests/{id}/approve:
    post:
      operationId: approvePromotionRequest
      tags: [promotionRequests]
      summary: Approve promotion request (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalAction"
      responses:
        "200":
          description: Approved request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionRequest"

  /promotion-requests/{id}/reject:
    post:
      operationId: rejectPromotionRequest
      tags: [promotionRequests]
      summary: Reject promotion request (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalAction"
      responses:
        "200":
          description: Rejected request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionRequest"

  /promotion-requests/{id}/request-revision:
    post:
      operationId: requestRevision
      tags: [promotionRequests]
      summary: Request revision (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalAction"
      responses:
        "200":
          description: Revision requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionRequest"

  # === ASSETS ===
  /events/{eventId}/assets:
    get:
      operationId: listEventAssets
      tags: [assets]
      summary: List all assets for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Upload new asset / new version for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetInput"
      responses:
        "201":
          description: Created asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get asset with all versions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset detail with versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetDetail"

  /assets/{id}/versions/{versionId}/select:
    patch:
      operationId: selectAssetVersion
      tags: [assets]
      summary: Select asset version as final (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionSelectInput"
      responses:
        "200":
          description: Version selected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetVersion"

  # === SCHEDULES ===
  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List schedules with optional filters
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: zoneId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"
    post:
      operationId: createSchedule
      tags: [schedules]
      summary: Create schedule entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "201":
          description: Created schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /schedules/{id}:
    patch:
      operationId: updateSchedule
      tags: [schedules]
      summary: Update schedule entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleUpdate"
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    delete:
      operationId: deleteSchedule
      tags: [schedules]
      summary: Delete schedule entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /schedules/today:
    get:
      operationId: getTodaySchedules
      tags: [schedules]
      summary: Get today's scheduled content
      responses:
        "200":
          description: Today's schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"

  # === COMMENTS ===
  /events/{eventId}/comments:
    get:
      operationId: listEventComments
      tags: [comments]
      summary: List comments for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Add comment to event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  # === EMAIL ===
  /events/{eventId}/send-email:
    post:
      operationId: sendEventEmail
      tags: [emailLogs]
      summary: Send email notification for an event (admin only)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailInput"
      responses:
        "200":
          description: Email sent result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailLog"

  /events/{eventId}/email-logs:
    get:
      operationId: listEventEmailLogs
      tags: [emailLogs]
      summary: List email send history for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailLog"

  # === ADMIN ===
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Get admin dashboard summary stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/conflicts:
    get:
      operationId: getScheduleConflicts
      tags: [admin]
      summary: Get schedule conflicts
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of conflicts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleConflict"

  /admin/calendar:
    get:
      operationId: getAdminCalendar
      tags: [admin]
      summary: Get all schedules for a month
      parameters:
        - name: month
          in: query
          schema:
            type: string
            description: "YYYY-MM format"
      responses:
        "200":
          description: Calendar schedule items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarScheduleItem"

  /admin/settings:
    get:
      operationId: getSystemSettings
      tags: [admin]
      summary: Get system settings
      responses:
        "200":
          description: System settings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SystemSetting"

  /admin/settings/{key}:
    put:
      operationId: updateSystemSetting
      tags: [admin]
      summary: Set a system setting value
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemSettingInput"
      responses:
        "200":
          description: Updated setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSetting"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserItem"

  /admin/users/{userId}/role:
    patch:
      operationId: updateUserRole
      tags: [admin]
      summary: Update a user's role
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleInput"
      responses:
        "200":
          description: Updated user role info
          content:
            application/json:
              schema:
                type: object
                required: [id, email, role]
                properties:
                  id:
                    type: integer
                  email:
                    type: string
                  role:
                    type: string

  /promotion-zones/{zoneId}:
    patch:
      operationId: updatePromotionZone
      tags: [promotionZones]
      summary: Update a promotion zone (admin only)
      parameters:
        - name: zoneId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionZoneInput"
      responses:
        "200":
          description: Updated zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionZone"
    delete:
      operationId: deletePromotionZone
      tags: [promotionZones]
      summary: Delete a promotion zone (admin only)
      parameters:
        - name: zoneId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    User:
      type: object
      required: [id, clerkId, email, role, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin, super_admin]
        organizationId:
          type: ["integer", "null"]
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string

    Organization:
      type: object
      required: [id, name, contactEmail, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        contactName:
          type: ["string", "null"]
        contactEmail:
          type: string
        contactPhone:
          type: ["string", "null"]
        createdAt:
          type: string

    OrganizationInput:
      type: object
      required: [name, contactEmail]
      properties:
        name:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string

    OrganizationUpdate:
      type: object
      properties:
        name:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string

    Event:
      type: object
      required: [id, title, status, organizationId, startDate, endDate, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, submitted, approved, revision_requested, rejected, completed]
        organizationId:
          type: integer
        organizationName:
          type: ["string", "null"]
        contactName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        startDate:
          type: string
        endDate:
          type: string
        venue:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        adminNote:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    EventList:
      type: object
      required: [events, total, page, limit]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    EventDetail:
      type: object
      required: [id, title, status, organizationId, startDate, endDate, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
